{{- if .Values.mongodb.initJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-mongodb-init
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: mongodb-init
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/component: database-init
    app.kubernetes.io/part-of: sausage-store
    env: "{{ .Values.environment | default "production" }}"
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mongodb-init
        app.kubernetes.io/instance: "{{ .Release.Name }}"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: mongodb-init
          image: mongo:7
          imagePullPolicy: IfNotPresent
          resources:
            {{- toYaml .Values.mongodb.initJob.resources | nindent 12 }}
          envFrom:
            - secretRef:
                name: mongodb-secret
          command:
            - /bin/sh
            - -ec
            - |
              until mongosh --host mongodb --port 27017 \
                --username "$MONGO_INITDB_ROOT_USERNAME" \
                --password "$MONGO_INITDB_ROOT_PASSWORD" \
                --authenticationDatabase admin \
                --eval "db.adminCommand('ping')" >/dev/null 2>&1; do
                echo "Waiting for MongoDB..."
                sleep 5
              done

              mongosh --host mongodb --port 27017 \
                --username "$MONGO_INITDB_ROOT_USERNAME" \
                --password "$MONGO_INITDB_ROOT_PASSWORD" \
                --authenticationDatabase admin <<'EOF'
              const dbName = process.env.MONGO_APP_DATABASE;
              const userName = process.env.MONGO_APP_USERNAME;
              const userPassword = process.env.MONGO_APP_PASSWORD;
              const appDb = db.getSiblingDB(dbName);

              if (!appDb.getUser(userName)) {
                appDb.createUser({
                  user: userName,
                  pwd: userPassword,
                  roles: [{ role: "readWrite", db: dbName }]
                });
              }
              EOF
{{- end }}
