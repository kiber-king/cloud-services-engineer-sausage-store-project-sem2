name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  CHART_DIR: sausage-store-chart
  CHART_NAME: sausage-store
  CHART_VERSION: 0.1.${{ github.run_number }}
  RELEASE_NAME: sausage-store
  KUBE_NAMESPACE: r-devops-magistracy-project-2sem-341598757
  FRONTEND_FQDN: front-kiber-king.2sem.students-projects.ru
  IMAGE_TAG: ${{ github.sha }}

jobs:
  push_docker_images:
    name: Push Docker images to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ env.IMAGE_TAG }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sausage-backend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sausage-backend:latest

      - name: Build and push backend-report
        uses: docker/build-push-action@v6
        with:
          context: ./backend-report
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sausage-backend-report:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sausage-backend-report:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sausage-frontend:${{ env.IMAGE_TAG }}
            ${{ secrets.DOCKERHUB_USERNAME }}/sausage-frontend:latest

  add_helm_chart_to_nexus:
    name: Add Helm Chart To Nexus
    runs-on: ubuntu-latest
    needs: push_docker_images
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint Helm chart
        run: helm lint "$CHART_DIR"

      - name: Package Helm chart
        run: helm package "$CHART_DIR" --version "$CHART_VERSION" --destination dist

      - name: Upload Helm chart to Nexus
        run: |
          CHART_PACKAGE="dist/${CHART_NAME}-${CHART_VERSION}.tgz"
          curl --fail --show-error \
            --user "${NEXUS_HELM_REPO_USER}:${NEXUS_HELM_REPO_PASSWORD}" \
            --upload-file "$CHART_PACKAGE" \
            "${NEXUS_HELM_REPO%/}/$(basename "$CHART_PACKAGE")"
        env:
          NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
          NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
          NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}

      - name: Verify Helm chart in Nexus
        run: |
          helm repo add nexus "$NEXUS_HELM_REPO" \
            --username "$NEXUS_HELM_REPO_USER" \
            --password "$NEXUS_HELM_REPO_PASSWORD"
          helm repo update
          helm search repo "nexus/${CHART_NAME}" --version "$CHART_VERSION"
        env:
          NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
          NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
          NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}

  deploy_helm_chart_to_kubernetes:
    name: Deploy Helm Chart To Kubernetes
    runs-on: ubuntu-latest
    needs: add_helm_chart_to_nexus
    steps:
      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${KUBE_CONFIG}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}

      - name: Add Nexus Helm repository
        run: |
          helm repo add nexus "$NEXUS_HELM_REPO" \
            --username "$NEXUS_HELM_REPO_USER" \
            --password "$NEXUS_HELM_REPO_PASSWORD"
          helm repo update
        env:
          NEXUS_HELM_REPO: ${{ secrets.NEXUS_HELM_REPO }}
          NEXUS_HELM_REPO_USER: ${{ secrets.NEXUS_HELM_REPO_USER }}
          NEXUS_HELM_REPO_PASSWORD: ${{ secrets.NEXUS_HELM_REPO_PASSWORD }}

      - name: Clean stale Helm hook jobs
        run: |
          kubectl delete job "${RELEASE_NAME}-mongodb-init" \
            --namespace "$KUBE_NAMESPACE" \
            --ignore-not-found=true

      - name: Deploy Helm chart
        run: |
          helm upgrade --install "$RELEASE_NAME" "nexus/${CHART_NAME}" \
            --namespace "$KUBE_NAMESPACE" \
            --create-namespace \
            --version "$CHART_VERSION" \
            --set backend.image="${DOCKERHUB_USERNAME}/sausage-backend" \
            --set backend.imageTag="$IMAGE_TAG" \
            --set backend-report.image="${DOCKERHUB_USERNAME}/sausage-backend-report" \
            --set backend-report.imageTag="$IMAGE_TAG" \
            --set frontend.image="${DOCKERHUB_USERNAME}/sausage-frontend" \
            --set frontend.imageTag="$IMAGE_TAG" \
            --set-string frontend.fqdn="$FRONTEND_FQDN" \
            --set-string global.postgresql.password="$POSTGRES_PASSWORD" \
            --set-string global.mongo.rootPassword="$MONGO_ROOT_PASSWORD" \
            --set-string global.mongo.database="sausage-store" \
            --set-string global.mongo.password="$MONGO_REPORT_PASSWORD" \
            --set-string global.mongo.appUri="mongodb://report:${MONGO_REPORT_PASSWORD}@mongodb:27017/sausage-store?authSource=sausage-store" \
            --wait \
            --timeout 10m
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MONGO_ROOT_PASSWORD: ${{ secrets.MONGO_ROOT_PASSWORD }}
          MONGO_REPORT_PASSWORD: ${{ secrets.MONGO_REPORT_PASSWORD }}
